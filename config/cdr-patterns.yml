# CDR detection patterns — customize to match your AI commit conventions.
# Used by cdr-sr-tracker.py to classify AI-authored vs human-authored code.

# Keywords in commit messages that flag AI authorship
ai_commit_keywords:
  - "Co-Authored-By: Claude"
  - "Co-Authored-By: ChatGPT"
  - "Co-Authored-By: OpenAI"
  - "Co-Authored-By: Copilot"
  - "Co-Authored-By: Gemini"
  - "Generated by AI"
  - "AI-assisted"

# Git author emails that indicate AI-assisted commits (for first-pass fallback)
ai_author_patterns:
  - "dev@voices.local"
